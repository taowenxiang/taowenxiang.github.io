<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <meta name="robots" content="noindex" />
    <link rel="canonical" href="https://www.wenxiangtao.com/" />
    <script>
      const targetOrigin = 'https://www.wenxiangtao.com'
      const targetUrl =
        targetOrigin + window.location.pathname + window.location.search + window.location.hash

      window.location.replace(targetUrl)
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0;url=https://www.wenxiangtao.com/" />
    </noscript>
  </head>
  <body>
    Redirecting to <a href="https://www.wenxiangtao.com/">https://www.wenxiangtao.com/</a>...
  </body>
</html>
